# Portal Scanner Configuration — Vinay Pokharkar
# Used by /career-ops scan to discover new offers automatically.
#
# Calibrated for:
#   - Final-year B.E. AI/ML student graduating 2026
#   - Based in India (Maharashtra), open to remote-global
#   - Targeting entry-level + internship AI/ML, full-stack, and backend roles
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#   Prefer the BRANDED company careers URL whenever available; use ATS-hosted URL only as fallback.

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Core AI/ML --
    - "AI"
    - "ML"
    - "LLM"
    - "Agent"
    - "Agentic"
    - "GenAI"
    - "Generative AI"
    - "NLP"
    - "MLOps"
    - "LLMOps"
    - "RAG"
    - "Applied AI"
    - "Machine Learning"
    - "Deep Learning"
    # -- Entry-level signals (THESE ARE WANTED, not negatives) --
    - "Intern"
    - "Internship"
    - "Graduate"
    - "New Grad"
    - "Associate"
    - "Trainee"
    - "Apprentice"
    - "Junior"
    - "Entry Level"
    - "Engineer I"
    - "SDE-1"
    - "SDE 1"
    - "SDE-I"
    # -- Stack signals (Vinay's actual toolkit) --
    - "Full Stack"
    - "Full-Stack"
    - "Backend"
    - "Python"
    - "FastAPI"
    - "Next.js"
    - "React Native"
    - "TypeScript"
    - "Node.js"
  negative:
    # -- Stack mismatches (Vinay does not work in these) --
    - ".NET"
    - "Java "
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    # -- Seniority mismatches (Vinay is final-year, not senior) --
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead "
    - "Head of"
    - "Director"
    - "VP"
    - "Manager"
    - "10+ years"
    - "8+ years"
    - "7+ years"
    - "5+ years"
    # -- Non-engineering --
    - "Sales Executive"
    - "Account Executive"
    - "BDR"
    - "SDR"
    - "Recruiter"
    - "HR "
  seniority_boost:
    # Entry-level prefixes that boost relevance (NOT a hard requirement)
    - "Junior"
    - "Associate"
    - "Graduate"
    - "Trainee"
    - "New Grad"
    - "Entry Level"
    - "Engineer I"
    - "SDE-1"
    - "Intern"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:

  # -- India-specific job boards --

  - name: Naukri — AI/ML entry-level India
    query: 'site:naukri.com "AI Engineer" OR "ML Engineer" OR "Machine Learning" "fresher" OR "entry level" OR "0-1 years" OR "junior"'
    enabled: true

  - name: Naukri — Full-Stack/Backend entry-level
    query: 'site:naukri.com "Full Stack" OR "Backend" OR "Python" "fresher" OR "0-2 years" OR "junior" India'
    enabled: true

  - name: Instahyre — AI/ML
    query: 'site:instahyre.com "AI Engineer" OR "ML Engineer" OR "Applied AI" OR "Full Stack"'
    enabled: true

  - name: Cutshort — AI/ML new grad
    query: 'site:cutshort.io "AI" OR "ML" OR "LLM" OR "Full Stack" "fresher" OR "junior" OR "entry level"'
    enabled: true

  - name: Internshala — AI/ML internships
    query: 'site:internshala.com "Machine Learning" OR "AI" OR "Data Science" OR "Full Stack" internship'
    enabled: true

  - name: Wellfound (AngelList) — AI startups India
    query: 'site:wellfound.com "AI Engineer" OR "ML Engineer" OR "Full Stack" India OR remote'
    enabled: true

  - name: LinkedIn India — AI entry-level
    query: 'site:linkedin.com/jobs "AI Engineer" OR "ML Engineer" "entry level" OR "associate" India'
    enabled: true

  - name: HackerRank Jobs — Entry-level engineering
    query: 'site:hackerrank.com/jobs "AI" OR "ML" OR "Backend" OR "Full Stack" entry OR junior OR fresher'
    enabled: true

  # -- Remote-global startup boards --

  - name: YC workatastartup — AI Engineer (entry/intern)
    query: 'site:workatastartup.com "AI Engineer" OR "ML Engineer" OR "Applied AI" intern OR "new grad" OR junior remote'
    enabled: true

  - name: YC workatastartup — Full-Stack remote
    query: 'site:workatastartup.com "Full Stack" OR "Founding Engineer" OR "SDE-1" remote India OR global'
    enabled: true

  - name: Ashby — AI Engineer entry-level
    query: 'site:jobs.ashbyhq.com "AI Engineer" OR "LLM Engineer" OR "Applied AI" "junior" OR "associate" OR "intern" OR "new grad"'
    enabled: true

  - name: Ashby — Agentic / RAG
    query: 'site:jobs.ashbyhq.com "Agentic" OR "AI Agent" OR "RAG" remote'
    enabled: true

  - name: Greenhouse — AI Engineer entry-level
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "AI Engineer" OR "Machine Learning Engineer" "associate" OR "new grad" OR "entry" OR "I"'
    enabled: true

  - name: Greenhouse — Full-Stack new grad
    query: 'site:job-boards.greenhouse.io "Full Stack" OR "Software Engineer" "new grad" OR "associate" OR "I" remote'
    enabled: true

  - name: Workable — AI/ML entry-level
    query: 'site:apply.workable.com "AI" OR "Machine Learning" OR "Full Stack" junior OR associate OR intern remote'
    enabled: true

  # -- Remote-friendly aggregators --

  - name: RemoteOK — AI/Full-Stack remote
    query: 'site:remoteok.com "AI Engineer" OR "ML Engineer" OR "Full Stack" OR "Backend" junior OR entry OR worldwide'
    enabled: true

  - name: WeWorkRemotely — AI/Backend
    query: 'site:weworkremotely.com "AI" OR "Machine Learning" OR "Full Stack" OR "Backend"'
    enabled: true

  - name: Himalayas — Remote AI/ML
    query: 'site:himalayas.app "AI Engineer" OR "ML Engineer" OR "Full Stack" worldwide OR India'
    enabled: true

  - name: Working Nomads — AI/Backend remote
    query: 'site:workingnomads.com "AI Engineer" OR "ML Engineer" OR "Backend" OR "Full Stack"'
    enabled: true

  # -- AI-specific aggregators --

  - name: ai-jobs.net — Applied AI/ML entry
    query: 'site:ai-jobs.net "Applied AI" OR "Machine Learning Engineer" OR "AI Engineer" junior OR associate OR remote'
    enabled: true

  - name: HN Who's Hiring — Remote AI
    query: 'site:news.ycombinator.com OR site:hnrss.org "AI Engineer" OR "ML Engineer" OR "Founding Engineer" remote India OR worldwide'
    enabled: true

